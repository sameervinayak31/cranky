<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#211613">
<title>Cranky</title>
<link rel="icon" href="cranky-logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#211613; --surface:#2E211C; --surface2:#3A2A23; --line:#4A3730;
  --cream:#F3E9DC; --muted:#B3A093; --accent:#FF7A3D; --accent2:#6FB3A8; --low:#F2B705;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--cream);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  padding-bottom:88px;
}
button{font-family:inherit;color:inherit;cursor:pointer}
input{font-family:inherit}

/* ---- shell ---- */
.wrap{max-width:480px;margin:0 auto;padding:20px 18px 24px}
.topbar{display:flex;align-items:center;gap:12px;padding:6px 2px 22px}
.topbar svg{width:40px;height:40px;flex:none}
.mark{font-family:'Anton',sans-serif;font-size:32px;letter-spacing:1px;text-transform:uppercase;line-height:1}

/* ---- order form ---- */
.field{margin-bottom:22px}
.eyebrow{font-family:'Anton',sans-serif;text-transform:uppercase;letter-spacing:2px;
  font-size:13px;color:var(--muted);margin:0 0 10px 2px}
.tiles{display:flex;flex-wrap:wrap;gap:9px}
.tile{
  background:var(--surface);border:1.5px solid var(--line);border-radius:14px;
  padding:12px 14px;font-size:15px;font-weight:600;color:var(--cream);
  transition:.12s;line-height:1.2;min-height:46px;display:flex;flex-direction:column;
  justify-content:center;gap:2px;
}
.tile:active{transform:scale(.97)}
.tile.sel{border-color:var(--accent);background:rgba(255,122,61,.14);color:var(--cream)}
.tile .sub{font-weight:500;font-size:12px;color:var(--muted)}
.tile.sel .sub{color:var(--accent)}
.tile .sub.low{color:var(--low)}
.tile.plus{color:var(--muted);font-weight:700;font-size:20px;align-items:center}
.forinput{
  margin-top:9px;width:100%;background:var(--surface);border:1.5px solid var(--line);
  border-radius:14px;padding:13px 14px;color:var(--cream);font-size:15px;
}
.forinput:focus{outline:none;border-color:var(--accent)}
.forinput.sel{border-color:var(--accent);background:rgba(255,122,61,.14)}

/* ---- actions ---- */
.order{
  width:100%;background:var(--accent);border:none;border-radius:16px;color:#241009;
  font-family:'Anton',sans-serif;text-transform:uppercase;letter-spacing:1.5px;
  font-size:22px;padding:18px;margin-top:6px;transition:.12s;
}
.order:active{transform:scale(.98)}
.order:disabled{background:var(--surface2);color:var(--muted)}
.addbeans{
  width:100%;background:transparent;border:1.5px solid var(--line);border-radius:16px;
  color:var(--cream);font-weight:600;font-size:15px;padding:15px;margin-top:12px;
}
.addbeans:active{transform:scale(.99)}

/* ---- confirm splash ---- */
.splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(33,22,19,.72);z-index:60;opacity:0;pointer-events:none;transition:.2s}
.splash.on{opacity:1}
.splash span{font-size:96px;transform:scale(.6);transition:.3s cubic-bezier(.2,1.4,.4,1)}
.splash.on span{transform:scale(1)}

/* ---- modal ---- */
.scrim{position:fixed;inset:0;background:rgba(20,12,10,.6);z-index:50;display:none;
  align-items:flex-end;justify-content:center}
.scrim.on{display:flex}
.sheet{background:var(--surface);width:100%;max-width:480px;border-radius:22px 22px 0 0;
  padding:22px 20px calc(24px + env(safe-area-inset-bottom));border:1px solid var(--line);border-bottom:none}
.sheet .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.sheet .head .eyebrow{margin:0}
.x{background:none;border:none;font-size:26px;color:var(--muted);line-height:1;padding:0 4px}
.lbl{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 6px 2px;
  text-transform:uppercase;letter-spacing:1px}
.inp{width:100%;background:var(--surface2);border:1.5px solid var(--line);border-radius:12px;
  padding:13px 14px;color:var(--cream);font-size:15px;margin-bottom:16px}
.inp:focus{outline:none;border-color:var(--accent)}

/* ---- stats ---- */
.page-title{font-family:'Anton',sans-serif;text-transform:uppercase;letter-spacing:1px;
  font-size:34px;margin:0 0 20px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;
  padding:16px 16px 10px;margin-bottom:16px}
.card h3{font-family:'Anton',sans-serif;text-transform:uppercase;letter-spacing:1.5px;
  font-size:14px;color:var(--muted);margin:2px 2px 14px;font-weight:400}
.chartbox{position:relative;height:200px}

/* ---- maintenance ---- */
.msec{margin-bottom:26px}
.row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:11px 13px;margin-bottom:8px}
.row .nm{flex:1;font-weight:600;font-size:15px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row.arch .nm{color:var(--muted)}
.iconbtn{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;padding:2px 6px}
.addrow{display:flex;gap:8px;margin-top:4px}
.addrow input{flex:1;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;
  padding:11px 13px;color:var(--cream);font-size:15px}
.addrow input:focus{outline:none;border-color:var(--accent)}
.addrow button{background:var(--accent);border:none;border-radius:12px;color:#241009;
  font-weight:700;padding:0 18px;font-size:15px}
.beancard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.beancard.arch{opacity:.6}
.beancard .bhead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:12px}
.beancard .bname{font-weight:700;font-size:16px}
.beancard .bnotes{color:var(--muted);font-size:13px;margin-top:2px}
.ctrls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.ctl{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--line);
  border-radius:10px;padding:7px 10px}
.ctl .k{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.ctl input{width:58px;background:none;border:none;color:var(--cream);font-size:15px;font-weight:600;text-align:right}
.ctl input:focus{outline:none}
.step,.pill{background:var(--surface2);border:1px solid var(--line);border-radius:10px;
  padding:8px 12px;font-size:13px;font-weight:600;color:var(--cream)}
.pill.warn{color:var(--low)}

/* ---- nav ---- */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(33,22,19,.94);
  backdrop-filter:blur(10px);border-top:1px solid var(--line);
  display:flex;max-width:480px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
.nav button{flex:1;background:none;border:none;padding:12px 0 14px;font-size:11px;
  font-weight:600;letter-spacing:.5px;color:var(--muted);display:flex;flex-direction:column;
  align-items:center;gap:5px;text-transform:uppercase}
.nav button svg{width:22px;height:22px}
.nav button.on{color:var(--accent)}

/* ---- states ---- */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:64px 24px;gap:18px}
.state svg{width:72px;height:72px;opacity:.5}
.state.pulse svg{animation:p 1.1s ease-in-out infinite}
@keyframes p{0%,100%{opacity:.3}50%{opacity:.7}}
.retry{background:var(--surface);border:1.5px solid var(--line);border-radius:12px;
  padding:11px 20px;color:var(--cream);font-weight:600;font-size:14px}
.errline{color:var(--muted);font-size:14px;text-align:center}
.config{padding:48px 26px;line-height:1.6;color:var(--muted);font-size:14px}
.config code{color:var(--accent);font-family:ui-monospace,monospace}
.hide{display:none!important}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar" id="topbar">
    <!-- logo injected -->
    <span class="mark">Cranky</span>
  </div>
  <div id="view"></div>
</div>

<!-- add beans sheet -->
<div class="scrim" id="beanScrim">
  <div class="sheet">
    <div class="head"><span class="eyebrow">Add new beans</span><button class="x" id="beanClose">&times;</button></div>
    <label class="lbl">Name</label>
    <input class="inp" id="bName" autocomplete="off">
    <label class="lbl">Notes</label>
    <input class="inp" id="bNotes" autocomplete="off">
    <label class="lbl">Grams</label>
    <input class="inp" id="bGrams" type="number" inputmode="decimal" autocomplete="off">
    <button class="order" id="bSave">Add new beans</button>
  </div>
</div>

<div class="splash" id="splash"><span>☕</span></div>

<nav class="nav" id="nav"></nav>

<script>
/* ============================================================
   CONFIG — paste your deployed Apps Script Web App URL here
   ============================================================ */
const API_URL = "https://script.google.com/macros/s/AKfycbztRTXRv3VnDga0a2896gZJ7PYvhDf-_nzGZ6I91oNxp_tFvT5XBtWlH34wSDEhho-P2Q/exec";

const GRAMS_PER = 17.5;      // beans used per drink
const LOW_AT = 52.5;         // warn when a bag has this many grams or fewer

const LOGO = `<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M30 44 h52 v20 a26 26 0 0 1 -26 26 h0 a26 26 0 0 1 -26 -26 z" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
<path d="M82 51 h7 a12 12 0 0 1 0 24 h-7" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
<path d="M41 54 L52 59" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
<path d="M71 54 L60 59" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
<circle cx="47" cy="64" r="2.8" fill="currentColor"/><circle cx="65" cy="64" r="2.8" fill="currentColor"/>
<path d="M47 79 Q56 71 65 79" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
<path d="M47 69 c -4.5 7 -4.5 10.5 0 10.5 c 4.5 0 4.5 -3.5 0 -10.5 z" fill="#FF7A3D"/></svg>`;

document.querySelector('#topbar').insertAdjacentHTML('afterbegin', `<span style="color:var(--cream)">${LOGO}</span>`);

/* ---- JSONP data layer (sidesteps Apps Script CORS) ---- */
let _cb = 0;
function api(params){
  return new Promise((resolve,reject)=>{
    const name = '_ck'+(_cb++);
    const s = document.createElement('script');
    const t = setTimeout(()=>{done(); reject(new Error('timeout'));}, 20000);
    function done(){ delete window[name]; s.remove(); clearTimeout(t); }
    window[name] = d=>{ done(); resolve(d); };
    s.onerror = ()=>{ done(); reject(new Error('network')); };
    const q = new URLSearchParams(Object.assign({}, params, {callback:name})).toString();
    s.src = API_URL + '?' + q;
    document.body.appendChild(s);
  });
}

/* ---- state ---- */
let ST = { beans:[], drinks:[], baristas:[], people:[], log:[] };
let tab = 'order';
let sel = { beanId:null, drink:null, barista:null, forVal:null, forCustom:false };

const $ = s=>document.querySelector(s);
const view = $('#view');

/* ---- nav ---- */
const NAV = [
  ['order','Order','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>'],
  ['stats','Stats','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="12"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="18" y1="20" x2="18" y2="9"/></svg>'],
  ['maint','Maintenance','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 0 0 5.4-5.4l-2.1 2.1-2.1-.6-.6-2.1Z"/></svg>']
];
function renderNav(){
  $('#nav').innerHTML = NAV.map(([id,label,ic])=>
    `<button class="${tab===id?'on':''}" data-tab="${id}">${ic}<span>${label}</span></button>`).join('');
  document.querySelectorAll('#nav button').forEach(b=>
    b.onclick=()=>{ tab=b.dataset.tab; render(); });
}

/* ---- helpers ---- */
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const activeBeans = ()=>ST.beans.filter(b=>b.status==='active');

/* ============================================================ RENDER */
function render(){
  renderNav();
  if(API_URL.indexOf('PASTE_')===0){ view.innerHTML =
    `<div class="config">Add your Apps Script Web App URL to <code>API_URL</code> at the top of <code>index.html</code>, then reload.</div>`; return; }
  if(tab==='order') renderOrder();
  if(tab==='stats') renderStats();
  if(tab==='maint') renderMaint();
}

/* ---------- ORDER ---------- */
function renderOrder(){
  const beans = activeBeans();
  if(beans.length===1 && sel.beanId===null) sel.beanId = beans[0].id;

  const beanTiles = beans.map(b=>{
    const low = b.grams<=LOW_AT;
    const sub = low ? `Low · ${fmt(b.grams)}g left` : `${fmt(b.grams)}g`;
    return `<button class="tile ${sel.beanId===b.id?'sel':''}" data-bean="${b.id}">
      <span>${esc(b.name)}</span><span class="sub ${low?'low':''}">${sub}</span></button>`;
  }).join('');

  const drinkTiles = ST.drinks.map(d=>
    `<button class="tile ${sel.drink===d?'sel':''}" data-drink="${esc(d)}">${esc(d)}</button>`).join('');
  const baristaTiles = ST.baristas.map(b=>
    `<button class="tile ${sel.barista===b?'sel':''}" data-barista="${esc(b)}">${esc(b)}</button>`).join('');
  const forTiles = ST.people.map(p=>
    `<button class="tile ${(!sel.forCustom&&sel.forVal===p)?'sel':''}" data-for="${esc(p)}">${esc(p)}</button>`).join('')
    + `<button class="tile plus ${sel.forCustom?'sel':''}" id="forPlus">+</button>`;

  const ready = sel.beanId!=null && sel.drink && sel.barista && (sel.forCustom? (sel.forVal&&sel.forVal.trim()) : sel.forVal);

  view.innerHTML = `
    <div class="field"><p class="eyebrow">Beans</p><div class="tiles" id="beanRow">${beanTiles}</div></div>
    <div class="field"><p class="eyebrow">Drink</p><div class="tiles" id="drinkRow">${drinkTiles}</div></div>
    <div class="field"><p class="eyebrow">Barista</p><div class="tiles" id="barRow">${baristaTiles}</div></div>
    <div class="field"><p class="eyebrow">For</p><div class="tiles" id="forRow">${forTiles}</div>
      <input class="forinput ${sel.forCustom?'sel':''} ${sel.forCustom?'':'hide'}" id="forInput" placeholder="Name" value="${sel.forCustom?esc(sel.forVal||''):''}"></div>
    <button class="order" id="orderBtn" ${ready?'':'disabled'}>Order up</button>
    <button class="addbeans" id="addBtn">Add new beans</button>`;

  $('#beanRow').querySelectorAll('[data-bean]').forEach(b=>b.onclick=()=>{sel.beanId=+b.dataset.bean;renderOrder();});
  $('#drinkRow').querySelectorAll('[data-drink]').forEach(b=>b.onclick=()=>{sel.drink=b.dataset.drink;renderOrder();});
  $('#barRow').querySelectorAll('[data-barista]').forEach(b=>b.onclick=()=>{sel.barista=b.dataset.barista;renderOrder();});
  $('#forRow').querySelectorAll('[data-for]').forEach(b=>b.onclick=()=>{sel.forCustom=false;sel.forVal=b.dataset.for;renderOrder();});
  $('#forPlus').onclick=()=>{sel.forCustom=true;sel.forVal='';renderOrder();setTimeout(()=>$('#forInput').focus(),0);};
  const fi=$('#forInput'); if(fi) fi.oninput=()=>{sel.forVal=fi.value; $('#orderBtn').disabled = !(sel.beanId!=null&&sel.drink&&sel.barista&&fi.value.trim());};
  $('#addBtn').onclick=openBeanSheet;
  $('#orderBtn').onclick=placeOrder;
}
const fmt = n => (Math.round(n*10)/10).toString();

async function placeOrder(){
  const btn=$('#orderBtn'); btn.disabled=true;
  const bean = ST.beans.find(b=>b.id===sel.beanId);
  try{
    const r = await api({action:'log', beanId:sel.beanId, barista:sel.barista, drink:sel.drink, for:sel.forVal});
    if(!r||!r.ok) throw new Error('bad');
    if(bean) bean.grams = r.grams;
    ST.log.push({ts:new Date().toISOString(), barista:sel.barista, for:sel.forVal, drink:sel.drink, bean:bean?bean.name:'', grams:GRAMS_PER});
    splash();
    sel.drink=null; sel.forVal=sel.forCustom?'':null; sel.forCustom=false;
    renderOrder();
  }catch(e){ btn.disabled=false; errToast(); }
}
function splash(){ const s=$('#splash'); s.classList.add('on'); setTimeout(()=>s.classList.remove('on'),900); }

/* ---------- ADD BEANS SHEET ---------- */
function openBeanSheet(){ $('#bName').value='';$('#bNotes').value='';$('#bGrams').value=''; $('#beanScrim').classList.add('on'); setTimeout(()=>$('#bName').focus(),0); }
function closeBeanSheet(){ $('#beanScrim').classList.remove('on'); }
$('#beanClose').onclick=closeBeanSheet;
$('#beanScrim').onclick=e=>{ if(e.target===$('#beanScrim')) closeBeanSheet(); };
$('#bSave').onclick=async()=>{
  const name=$('#bName').value.trim(); if(!name) return;
  const btn=$('#bSave'); btn.disabled=true;
  try{
    const r=await api({action:'addBean', name, notes:$('#bNotes').value.trim(), grams:$('#bGrams').value||0});
    if(!r||!r.ok) throw new Error('bad');
    await refresh(); closeBeanSheet(); if(tab==='order') renderOrder();
  }catch(e){ errToast(); }
  finally{ btn.disabled=false; }
};

/* ---------- STATS ---------- */
let charts=[];
function renderStats(){
  charts.forEach(c=>c.destroy()); charts=[];
  if(!ST.log.length){ view.innerHTML = stateBlock(false); return; }
  view.innerHTML = `
    <h1 class="page-title">Stats</h1>
    <div class="card"><h3>Drinks by type</h3><div class="chartbox"><canvas id="c1"></canvas></div></div>
    <div class="card"><h3>Drinks by person</h3><div class="chartbox"><canvas id="c2"></canvas></div></div>
    <div class="card"><h3>Drinks over time</h3><div class="chartbox"><canvas id="c3"></canvas></div></div>`;

  const byType = tally(ST.log.map(l=>l.drink));
  const byPerson = tally(ST.log.map(l=>l.for));
  const byDay = {};
  ST.log.forEach(l=>{ const d=(l.ts||'').slice(0,10); if(d) byDay[d]=(byDay[d]||0)+1; });
  const days = Object.keys(byDay).sort();

  const cream='#F3E9DC', muted='#B3A093', acc='#FF7A3D', acc2='#6FB3A8', grid='rgba(179,160,147,.15)';
  Chart.defaults.color=muted; Chart.defaults.font.family="'Inter',sans-serif";

  charts.push(new Chart($('#c1'),{type:'bar',
    data:{labels:Object.keys(byType),datasets:[{data:Object.values(byType),backgroundColor:acc,borderRadius:6}]},
    options:barOpts(grid)}));
  charts.push(new Chart($('#c2'),{type:'bar',
    data:{labels:Object.keys(byPerson),datasets:[{data:Object.values(byPerson),backgroundColor:acc2,borderRadius:6}]},
    options:barOpts(grid)}));
  charts.push(new Chart($('#c3'),{type:'line',
    data:{labels:days,datasets:[{data:days.map(d=>byDay[d]),borderColor:acc,backgroundColor:'rgba(255,122,61,.15)',
      fill:true,tension:.3,pointRadius:3,pointBackgroundColor:acc}]},
    options:barOpts(grid)}));
}
function tally(arr){ const o={}; arr.forEach(v=>{ if(v==null||v==='')return; o[v]=(o[v]||0)+1; }); 
  return Object.fromEntries(Object.entries(o).sort((a,b)=>b[1]-a[1])); }
function barOpts(grid){ return {responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false}},
  scales:{x:{grid:{display:false},ticks:{maxRotation:60,minRotation:0,autoSkip:false,font:{size:10}}},
          y:{grid:{color:grid},ticks:{precision:0,stepSize:1},beginAtZero:true}}}; }

/* ---------- MAINTENANCE ---------- */
function renderMaint(){
  view.innerHTML = `<h1 class="page-title">Maintenance</h1>
    ${optSection('Drink types','drink',ST.drinks)}
    ${optSection('Baristas','barista',ST.baristas)}
    ${optSection('People','person',ST.people)}
    <div class="msec"><p class="eyebrow">Beans</p><div id="beansMaint">${ST.beans.map(beanCard).join('')||''}</div></div>`;

  document.querySelectorAll('[data-opt-remove]').forEach(b=>b.onclick=async()=>{
    const [cat,val]=JSON.parse(b.dataset.optRemove);
    b.disabled=true; try{ await api({action:'removeOption',category:cat,value:val}); await refresh(); renderMaint(); }catch(e){errToast();}
  });
  document.querySelectorAll('[data-opt-add]').forEach(f=>{
    const cat=f.dataset.optAdd, inp=f.querySelector('input'), btn=f.querySelector('button');
    const add=async()=>{ const v=inp.value.trim(); if(!v)return; btn.disabled=true;
      try{ await api({action:'addOption',category:cat,value:v}); await refresh(); renderMaint(); }catch(e){errToast();btn.disabled=false;} };
    btn.onclick=add; inp.onkeydown=e=>{ if(e.key==='Enter') add(); };
  });
  wireBeanCards();
}
function optSection(title,cat,items){
  const rows=(items||[]).map(v=>`<div class="row"><span class="nm">${esc(v)}</span>
    <button class="iconbtn" data-opt-remove='${esc(JSON.stringify([cat,v]))}'>&times;</button></div>`).join('');
  return `<div class="msec"><p class="eyebrow">${title}</p>${rows}
    <div class="addrow" data-opt-add="${cat}"><input autocomplete="off"><button>Add</button></div></div>`;
}
function beanCard(b){
  const low=b.grams<=LOW_AT, arch=b.status!=='active';
  return `<div class="beancard ${arch?'arch':''}" data-bean-id="${b.id}">
    <div class="bhead"><div><div class="bname">${esc(b.name)}</div>${b.notes?`<div class="bnotes">${esc(b.notes)}</div>`:''}</div>
      <span class="pill ${low?'warn':''}">${fmt(b.grams)}g${low?' · Low':''}</span></div>
    <div class="ctrls">
      <div class="ctl"><span class="k">Grind</span><input type="number" min="0" max="10" step="1" data-grind value="${b.grind===''||b.grind==null?'':b.grind}"></div>
      <div class="ctl"><span class="k">Grams</span><input type="number" step="0.5" data-grams value="${fmt(b.grams)}"></div>
      <button class="step" data-dec>&minus;17.5g</button>
      <button class="step" data-arch>${arch?'Restore':'Archive'}</button>
    </div></div>`;
}
function wireBeanCards(){
  document.querySelectorAll('[data-bean-id]').forEach(card=>{
    const id=+card.dataset.beanId;
    const gr=card.querySelector('[data-grind]'), gm=card.querySelector('[data-grams]');
    gr.onchange=async()=>{ let v=gr.value===''?'':Math.max(0,Math.min(10,Math.round(+gr.value)));
      await api({action:'updateBean',id,grind:v}); await refresh(); };
    gm.onchange=async()=>{ await api({action:'updateBean',id,grams:+gm.value}); await refresh(); renderMaint(); };
    card.querySelector('[data-dec]').onclick=async()=>{ await api({action:'updateBean',id,delta:-GRAMS_PER}); await refresh(); renderMaint(); };
    card.querySelector('[data-arch]').onclick=async()=>{ const b=ST.beans.find(x=>x.id===id);
      await api({action:'updateBean',id,status:b.status==='active'?'archived':'active'}); await refresh(); renderMaint(); };
  });
}

/* ---------- shared states ---------- */
function stateBlock(isError){
  return `<div class="state ${isError?'':'pulse'}"><span style="color:var(--cream)">${LOGO}</span>
    ${isError?`<p class="errline">Couldn’t reach the sheet.</p><button class="retry" id="retryBtn">Retry</button>`:''}</div>`;
}
function errToast(){ const s=$('#splash'); s.querySelector('span').textContent='⚠️'; s.classList.add('on');
  setTimeout(()=>{s.classList.remove('on'); setTimeout(()=>s.querySelector('span').textContent='☕',250);},1100); }

/* ---------- data load ---------- */
async function refresh(){
  const r = await api({action:'getData'});
  if(!r||!r.ok) throw new Error('bad');
  ST.beans = (r.beans||[]).map(b=>({id:b.id,name:b.name,notes:b.notes,grind:b.grind,grams:+b.grams,status:b.status||'active'}));
  ST.drinks = (r.options&&r.options.drink)||[];
  ST.baristas = (r.options&&r.options.barista)||[];
  ST.people = (r.options&&r.options.person)||[];
  ST.log = r.log||[];
}
async function boot(){
  renderNav();
  if(API_URL.indexOf('PASTE_')===0){ render(); return; }
  view.innerHTML = stateBlock(false);
  try{ await refresh(); render(); }
  catch(e){ view.innerHTML = stateBlock(true); const rb=$('#retryBtn'); if(rb) rb.onclick=boot; }
}
boot();
</script>
</body>
</html>
