<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#211613">
<title>Cranky</title>
<link rel="icon" href="cranky-logo.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cranky">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#211613; --surface:#2E211C; --surface2:#3A2A23; --line:#4A3730;
  --cream:#F3E9DC; --muted:#B3A093; --accent:#FF7A3D; --accent2:#6FB3A8; --low:#F2B705;
  --tile:rgba(243,233,220,.18);
  color-scheme:dark;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--cream);
  font-family:'Space Grotesk',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased; padding-bottom:88px;
}
button{font-family:inherit;color:inherit;cursor:pointer}
input{font-family:inherit}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

/* shell */
.wrap{max-width:480px;margin:0 auto;padding:calc(20px + env(safe-area-inset-top)) 18px 24px}
.topbar{display:flex;align-items:center;justify-content:center;gap:12px;padding:6px 2px 16px;margin-bottom:20px;border-bottom:1.5px solid var(--tile);position:relative}
.topbar svg{width:40px;height:40px;flex:none}
.mark{font-family:'Anton',sans-serif;font-size:52px;letter-spacing:4px;text-transform:uppercase;line-height:1}
.refreshBtn{position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);padding:8px}
.refreshBtn svg{width:20px;height:20px}
.refreshBtn:disabled{opacity:.5}
.refreshBtn.spin svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* order form */
.field{margin-bottom:22px}
.eyebrow{font-family:'Anton',sans-serif;text-transform:uppercase;letter-spacing:2px;
  font-size:13px;color:var(--muted);margin:0 0 12px 0;display:flex;align-items:center;gap:12px;
  border-left:3px solid var(--accent);padding-left:10px}
.eyebrow::after{content:"";flex:1;height:2px;border-radius:2px;background:rgba(243,233,220,.14)}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}
.tile{
  background:var(--surface);border:1.5px solid var(--tile);border-radius:14px;
  padding:12px 14px;font-size:15px;font-weight:600;color:var(--cream);
  transition:.12s;line-height:1.18;display:flex;flex-direction:column;justify-content:center;gap:3px;
}
.tile:active{transform:scale(.97)}
.tile.sel{border-color:var(--accent);background:rgba(255,122,61,.14)}
.tile.tc{align-items:center;text-align:center}
.tile.drink{min-height:78px}
.dicon{width:24px;height:24px}
.tile.short{min-height:50px}
.tile.bean{min-height:62px;position:relative;z-index:0;overflow:hidden}
.tile.bean .flagwm{position:absolute;z-index:-1;right:-10px;bottom:-12px;width:76px;height:76px;opacity:.15;pointer-events:none}
.tile.bean .flagwm path{fill:none;stroke:var(--cream);stroke-width:3;stroke-linejoin:round;stroke-linecap:round}
.tile .sub{font-weight:500;font-size:12px;color:var(--muted)}
.tile.sel .sub{color:var(--accent)}
.tile .sub.low{color:var(--low)}
.tile.plus{color:var(--muted);font-weight:700;font-size:22px;align-items:center;justify-content:center;min-height:50px}
.moodgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.tile.mood{padding:9px 2px;gap:4px}
.tile.mood svg{width:22px;height:22px}
.tile.mood .moodlbl{font-size:9px;font-weight:600;line-height:1.1}
.forinput{
  margin-top:9px;width:100%;background:var(--surface);border:1.5px solid var(--tile);
  border-radius:14px;padding:13px 14px;color:var(--cream);font-size:15px;
}
.forinput:focus{outline:none;border-color:var(--accent)}
.forinput.sel{border-color:var(--accent);background:rgba(255,122,61,.14)}

/* actions */
.order{width:100%;background:var(--accent);border:none;border-radius:16px;color:#241009;
  font-family:'Anton',sans-serif;text-transform:uppercase;letter-spacing:1.5px;
  font-size:22px;padding:18px;margin-top:6px;transition:.12s;}
.order:active{transform:scale(.98)}
.order:disabled{background:var(--surface2);color:var(--muted)}
.tile.addtile{background:transparent;border:1.5px dashed var(--line);color:var(--muted)}
.tile.addtile .addicon{font-size:20px;font-weight:700;line-height:1}
.tile.addtile .sub{color:var(--muted)}
.tile.addtile.sel{border-style:solid;border-color:var(--accent);background:rgba(255,122,61,.14);color:var(--cream)}
.addbeans{width:100%;background:transparent;border:1.5px dashed var(--line);border-radius:14px;color:var(--muted);font-weight:600;font-size:15px;padding:14px;margin-bottom:18px}
.addbeans:active{transform:scale(.99)}

/* confirm splash */
.splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(33,22,19,.72);z-index:60;opacity:0;pointer-events:none;transition:.2s}
.splash.on{opacity:1}
.splash span{font-size:96px;transform:scale(.6);transition:.3s cubic-bezier(.2,1.4,.4,1);color:var(--cream)}
.splash span svg{width:120px;height:120px}
.splash.on span{transform:scale(1)}

/* modal */
.scrim{position:fixed;inset:0;background:rgba(20,12,10,.6);z-index:50;display:none;
  align-items:flex-end;justify-content:center}
.scrim.on{display:flex}
.sheet{background:var(--surface);width:100%;max-width:480px;border-radius:22px 22px 0 0;
  padding:22px 20px calc(24px + env(safe-area-inset-bottom));border:1px solid var(--line);border-bottom:none;
  max-height:88vh;overflow:auto}
.sheet .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.sheet .head .eyebrow{margin:0}
.x{background:none;border:none;font-size:26px;color:var(--muted);line-height:1;padding:0 4px}
.lbl{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 6px 2px;
  text-transform:uppercase;letter-spacing:1px}
.inp{width:100%;background:var(--surface2);border:1.5px solid var(--line);border-radius:12px;
  padding:13px 14px;color:var(--cream);font-size:15px;margin-bottom:16px}
.inp:focus{outline:none;border-color:var(--accent)}

/* stats */
.page-title{font-family:'Anton',sans-serif;text-transform:uppercase;letter-spacing:1px;font-size:34px;margin:0 0 20px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px 16px 12px;margin-bottom:16px}
.card h3{font-family:'Anton',sans-serif;text-transform:uppercase;letter-spacing:1.5px;
  font-size:14px;color:var(--muted);margin:2px 2px 14px;font-weight:400}
.chartbox{position:relative;height:210px}
.chartbox.tall{height:260px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.chip{background:var(--surface);border:1.5px solid var(--tile);border-radius:999px;
  padding:8px 15px;font-size:13px;font-weight:600;color:var(--cream);transition:.12s}
.chip:active{transform:scale(.96)}
.chip.sel{border-color:var(--accent);background:rgba(255,122,61,.16)}

/* maintenance */
.msec{margin-bottom:26px}
.row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:11px 13px;margin-bottom:8px}
.row .nm{flex:1;font-weight:600;font-size:15px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.iconbtn{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;padding:2px 6px}
.synctag{color:var(--muted);font-size:11px;font-style:italic;padding:2px 6px;flex:none}
.addrow{display:flex;gap:8px;margin-top:4px}
.addrow input{flex:1;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;
  padding:11px 13px;color:var(--cream);font-size:15px}
.addrow input:focus{outline:none;border-color:var(--accent)}
.addrow button{background:var(--accent);border:none;border-radius:12px;color:#241009;font-weight:700;padding:0 18px;font-size:15px}
.row select{background:var(--surface2);border:1px solid var(--line);border-radius:8px;color:var(--cream);font-size:12px;padding:5px 6px;font-family:inherit}
.row select:focus{outline:none}
.beancard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.beanstack{margin-bottom:10px}
.beanstack .beancard{margin-bottom:0}
.stackbar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 2px 6px}
.stackcount{color:var(--muted);font-size:12px;font-weight:600;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stacknav{background:var(--surface2);border:1px solid var(--line);border-radius:8px;color:var(--cream);font-size:16px;font-weight:700;padding:2px 10px;line-height:1.4}
.beancard.arch{opacity:.6}
.beancard .bhead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:12px}
.beancard .bname{font-weight:700;font-size:16px}
.beancard .bnotes{color:var(--muted);font-size:13px;margin-top:3px}
.ctrls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.ctl{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:7px 10px}
.ctl .k{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.ctl input{width:52px;background:none;border:none;color:var(--cream);font-size:15px;font-weight:600;text-align:right}
.ctl input[type=date]{width:auto;text-align:left;font-weight:500}
.ctl input:focus{outline:none}
.ctl select{background:none;border:none;color:var(--cream);font-size:13px;font-weight:600;font-family:inherit}
.ctl select:focus{outline:none}
.step{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--cream)}
.step.save{background:var(--accent);border-color:var(--accent);color:#241009;font-weight:700}
.beancard .bidfields{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
.beancard .bidfields input{background:none;border:none;padding:0;width:100%;font-family:inherit;color:var(--cream)}
.beancard input.bname{font-weight:700;font-size:16px}
.beancard input.broaster,.beancard input.bnotes,.beancard input.bprocess,.beancard input.bvariety{color:var(--muted);font-size:13px}
.beancard .bpair{display:flex;gap:10px;margin-top:1px}
.beancard .bpair input{min-width:0}
.beancard .bidfields input::placeholder{color:var(--muted);opacity:.6}
.beancard .bidfields input:focus{outline:none;border-bottom:1px solid var(--accent)}
.pill{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--cream)}
.pill.warn{color:var(--low)}

/* nav */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(33,22,19,.94);
  backdrop-filter:blur(10px);border-top:1px solid var(--line);
  display:flex;max-width:480px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
.nav button{flex:1;background:none;border:none;padding:12px 0 14px;font-size:11px;font-weight:600;
  letter-spacing:.5px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:5px;text-transform:uppercase}
.nav button svg{width:22px;height:22px}
.nav button.on{color:var(--accent)}
.banner{position:fixed;left:12px;right:12px;bottom:calc(78px + env(safe-area-inset-bottom));z-index:45;
  max-width:456px;margin:0 auto;background:var(--low);color:#241009;border-radius:12px;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;font-weight:600}
.banner button{background:#241009;color:var(--low);border:none;border-radius:8px;padding:6px 12px;font-weight:700;font-size:12px}

/* states */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;gap:18px}
.state svg{width:72px;height:72px;opacity:.5}
.state.pulse svg{animation:p 1.1s ease-in-out infinite}
@keyframes p{0%,100%{opacity:.3}50%{opacity:.7}}
.retry{background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:11px 20px;color:var(--cream);font-weight:600;font-size:14px}
.errline{color:var(--muted);font-size:14px;text-align:center}
.config{padding:48px 26px;line-height:1.6;color:var(--muted);font-size:14px}
.config code{color:var(--accent);font-family:ui-monospace,monospace}
.hide{display:none!important}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar" id="topbar"><span class="mark">Cranky</span>
    <button class="refreshBtn" id="refreshBtn" aria-label="Refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/></svg>
    </button>
  </div>
  <div id="view"></div>
</div>

<div class="scrim" id="beanScrim">
  <div class="sheet">
    <div class="head"><span class="eyebrow">Add new beans</span><button class="x" id="beanClose">&times;</button></div>
    <label class="lbl">Name</label><input class="inp" id="bName" autocomplete="off">
    <label class="lbl">Roaster</label><input class="inp" id="bRoaster" list="roasterList" autocomplete="off">
    <label class="lbl">Notes</label><input class="inp" id="bNotes" autocomplete="off">
    <label class="lbl">Process (optional)</label><input class="inp" id="bProcess" autocomplete="off">
    <label class="lbl">Variety (optional)</label><input class="inp" id="bVariety" autocomplete="off">
    <label class="lbl">Grams</label><input class="inp" id="bGrams" type="text" inputmode="decimal" autocomplete="off">
    <label class="lbl">Date opened</label><input class="inp" id="bOpened" type="date">
    <label class="lbl">Roast date (optional)</label><input class="inp" id="bRoastDate" type="date">
    <label class="lbl">Cost, &pound; (optional)</label><input class="inp" id="bCost" type="text" inputmode="decimal" autocomplete="off">
    <label class="lbl">Country</label><select class="inp" id="bCountry"></select>
    <label class="lbl">Our rating</label><input class="inp" id="bRating" type="number" min="1" max="10" step="1" inputmode="numeric" autocomplete="off">
    <button class="order" id="bSave">Add new beans</button>
  </div>
</div>

<datalist id="roasterList"></datalist>

<div class="scrim" id="logScrim">
  <div class="sheet">
    <div class="head"><span class="eyebrow">Drink log</span><button class="x" id="logClose">&times;</button></div>
    <div id="logList"></div>
  </div>
</div>

<div class="splash" id="splash"><span></span></div>
<div class="banner hide" id="syncBanner"><span>Couldn't save your last order</span><button id="syncRetry">Retry</button></div>
<nav class="nav" id="nav"></nav>

/* ---- JSONP data layer (sidesteps Apps Script CORS) ---- */
let _cb = 0;
function api(params){
  return new Promise((resolve,reject)=>{
    const name = '_ck'+(_cb++);
    const s = document.createElement('script');
    const t = setTimeout(()=>{done(); reject(new Error('timeout'));}, 20000);
    function done(){ delete window[name]; s.remove(); clearTimeout(t); }
    window[name] = d=>{ done(); resolve(d); };
    s.onerror = ()=>{ done(); reject(new Error('network')); };
    const q = new URLSearchParams(Object.assign({}, params, {callback:name})).toString();
    s.src = API_URL + '?' + q;
    document.body.appendChild(s);
  });
}

const CHART_URL='https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
let _chartLoad=null;
function ensureChart(){
  if(window.Chart) return Promise.resolve();
  if(_chartLoad) return _chartLoad;
  _chartLoad=new Promise((res,rej)=>{ const s=document.createElement('script');
    s.src=CHART_URL; s.onload=res; s.onerror=()=>{_chartLoad=null; rej(new Error('chart'));}; document.head.appendChild(s); });
  return _chartLoad;
}

function renderOrder(){
  const beans = activeBeans();
  if(beans.length===1 && sel.beanId===null) sel.beanId = beans[0].id;

  const beanTiles = beans.map(b=>{
    const low=b.grams<=LOW_AT;
    const sub=low?`Low · ${fmt(b.grams)}g left`:`${fmt(b.grams)}g`;
    return `<button class="tile bean ${sel.beanId===b.id?'sel':''}" data-bean="${b.id}">
      ${countryWatermark(b.country)}
      <span>${esc(b.name)}</span><span class="sub ${low?'low':''}">${sub}</span></button>`;
  }).join('');
  const addBeanTile = `<button class="tile bean tc addtile" id="addBtn"><span class="addicon">+</span><span class="sub">Add new beans</span></button>`;
  const drinkTiles = ST.drinks.map(d=>`<button class="tile tc drink ${sel.drink===d?'sel':''}" data-drink="${esc(d)}">${drinkIconSvg(iconFor(d))}<span>${esc(d)}</span></button>`).join('');
  const baristaTiles = ST.baristas.map(b=>`<button class="tile tc short ${sel.barista===b?'sel':''}" data-barista="${esc(b)}">${esc(b)}</button>`).join('');
  const forTiles = ST.people.map(p=>`<button class="tile tc short ${(!sel.forCustom&&sel.forVal===p)?'sel':''}" data-for="${esc(p)}">${esc(p)}</button>`).join('')
    + `<button class="tile plus addtile ${sel.forCustom?'sel':''}" id="forPlus">+</button>`;
  const moodTiles = MOODS.map(([id,label,ic])=>`<button class="tile mood tc ${sel.mood===id?'sel':''}" data-mood="${id}">${moodIconSvg(ic)}<span class="moodlbl">${esc(label)}</span></button>`).join('');
  const ready = sel.beanId!=null && sel.drink && sel.barista && (sel.forCustom?(sel.forVal&&sel.forVal.trim()):sel.forVal);

  view.innerHTML = `
    <div class="field"><p class="eyebrow">Beans</p><div class="grid" id="beanRow">${beanTiles}${addBeanTile}</div></div>
    <div class="field"><p class="eyebrow">Drink</p><div class="grid" id="drinkRow">${drinkTiles}</div></div>
    <div class="field"><p class="eyebrow">Barista</p><div class="grid" id="barRow">${baristaTiles}</div></div>
    <div class="field"><p class="eyebrow">For</p><div class="grid" id="forRow">${forTiles}</div>
      <input class="forinput ${sel.forCustom?'sel':''} ${sel.forCustom?'':'hide'}" id="forInput" placeholder="Name" value="${sel.forCustom?esc(sel.forVal||''):''}"></div>
    <div class="field"><p class="eyebrow">How you feeling</p><div class="moodgrid" id="moodRow">${moodTiles}</div></div>
    <button class="order" id="orderBtn" ${ready?'':'disabled'}>Order up</button>`;

  $('#beanRow').querySelectorAll('[data-bean]').forEach(b=>b.onclick=()=>{sel.beanId=+b.dataset.bean;renderOrder();});
  $('#drinkRow').querySelectorAll('[data-drink]').forEach(b=>b.onclick=()=>{sel.drink=b.dataset.drink;renderOrder();});
  $('#barRow').querySelectorAll('[data-barista]').forEach(b=>b.onclick=()=>{sel.barista=b.dataset.barista;renderOrder();});
  $('#forRow').querySelectorAll('[data-for]').forEach(b=>b.onclick=()=>{sel.forCustom=false;sel.forVal=b.dataset.for;renderOrder();});
  $('#forPlus').onclick=()=>{sel.forCustom=true;sel.forVal='';renderOrder();setTimeout(()=>$('#forInput').focus(),0);};
  const fi=$('#forInput'); if(fi) fi.oninput=()=>{sel.forVal=fi.value; $('#orderBtn').disabled=!(sel.beanId!=null&&sel.drink&&sel.barista&&fi.value.trim());};
  $('#moodRow').querySelectorAll('[data-mood]').forEach(b=>b.onclick=()=>{sel.mood = sel.mood===b.dataset.mood ? null : b.dataset.mood; renderOrder();});
  $('#addBtn').onclick=openBeanSheet;
  $('#orderBtn').onclick=placeOrder;
}

function placeOrder(){
  const bean=ST.beans.find(b=>b.id===sel.beanId);
  const params={action:'log',beanId:sel.beanId,barista:sel.barista,drink:sel.drink,for:sel.forVal,mood:sel.mood||''};
  if(bean) bean.grams=Math.max(0, Math.round((bean.grams-GRAMS_PER)*10)/10);
  ST.log.push({ts:new Date().toISOString(),barista:params.barista,for:params.for,drink:params.drink,bean:bean?bean.name:'',grams:GRAMS_PER,mood:params.mood});
  cacheSaveFromST();
  splash(); sel.drink=null; sel.forVal=sel.forCustom?'':null; sel.forCustom=false; sel.mood=null; renderOrder();
  api(params).then(r=>{
    if(!r||!r.ok) throw 0;
    if(bean) bean.grams=Math.max(0, r.grams);
    cacheSaveFromST();
  }).catch(()=>{ errToast(); refresh().then(renderCur).catch(()=>{ orderSyncFailed=true; updateSyncBanner(); }); });
}
function splash(){ const s=$('#splash'); s.querySelector('span').innerHTML=LOGO; s.classList.add('on'); setTimeout(()=>s.classList.remove('on'),900); }

/* ---------- sync failure banner ---------- */
let orderSyncFailed = false;
function updateSyncBanner(){ $('#syncBanner').classList.toggle('hide', !orderSyncFailed); }
$('#syncRetry').onclick=async()=>{
  const btn=$('#syncRetry'); btn.disabled=true;
  try{ await refresh(); renderCur(); }
  catch(e){ errToast(); }
  finally{ btn.disabled=false; }
};

function roasterOptions(){

}

/* ---------- DRINK LOG ---------- */
function openLogSheet(){
  $('#logScrim').classList.add('on');
  renderLogList();
  refresh().then(renderLogList).catch(()=>{});
}
function closeLogSheet(){ $('#logScrim').classList.remove('on'); }
$('#logClose').onclick=closeLogSheet;
$('#logScrim').onclick=e=>{ if(e.target===$('#logScrim')) closeLogSheet(); };
function renderLogList(){
  const entries=[...ST.log].sort((a,b)=>new Date(b.ts)-new Date(a.ts)).slice(0,40);
  $('#logList').innerHTML = entries.length ? entries.map(l=>{
    const d=new Date(l.ts);
    const time=isNaN(d)?'':d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
    const action = l.id!=null ? `<button class="iconbtn" data-log-remove="${l.id}">&times;</button>` : `<span class="synctag">syncing…</span>`;
    return `<div class="row"><span class="nm">${fmtDay(l.ts)} ${time} · ${esc(l.drink)} for ${esc(l.for)}</span>${action}</div>`;
  }).join('') : `<p class="errline">No drinks logged yet.</p>`;
  document.querySelectorAll('#logList [data-log-remove]').forEach(b=>b.onclick=()=>{
    const id=+b.dataset.logRemove;
    const idx=ST.log.findIndex(l=>l.id===id);
    let entry=null;
    if(idx>=0){ entry=ST.log[idx]; ST.log.splice(idx,1); }
    if(entry && entry.bean){
      const bean=ST.beans.find(x=>x.name===entry.bean);
      if(bean) bean.grams=Math.round((bean.grams+(entry.grams||GRAMS_PER))*10)/10;
    }
    cacheSaveFromST(); renderLogList(); if(tab==='order') renderOrder(); if(tab==='beans') renderBeans();
    api({action:'deleteLog',id}).then(r=>{ if(!r||!r.ok) throw 0; })
      .catch(()=>{ errToast(); refresh().then(()=>{ renderLogList(); renderCur(); }).catch(()=>{}); });
  });
}

/* ---------- STATS ---------- */
let charts=[];
let statPerson='All';
async function renderStats(){
  charts.forEach(c=>c.destroy()); charts=[];
  if(!ST.log.length){ view.innerHTML=stateBlock(false); return; }

  const forCounts=tally(ST.log.map(l=>l.for));
  const peopleAll=Object.keys(forCounts);
  if(statPerson!=='All' && !peopleAll.includes(statPerson)) statPerson='All';
  const chips=['All',...peopleAll];

  view.innerHTML=`
    <h1 class="page-title">Stats</h1>
    <div class="chips" id="statChips">${chips.map(p=>`<button class="chip ${statPerson===p?'sel':''}" data-person="${esc(p)}">${esc(p)}</button>`).join('')}</div>
    <div class="card"><h3>Drinks by type</h3><div class="chartbox"><canvas id="c1"></canvas></div></div>
    <div class="card"><h3>Drinks by person</h3><div class="chartbox tall"><canvas id="c2"></canvas></div></div>
    <div class="card"><h3>Drinks over time</h3><div class="chartbox tall"><canvas id="c3"></canvas></div></div>
    <div class="card"><h3>Drinks by country</h3><div class="chartbox tall"><canvas id="c4"></canvas></div></div>`;
  document.querySelectorAll('#statChips [data-person]').forEach(b=>b.onclick=()=>{ statPerson=b.dataset.person; renderStats(); });

  try{ await ensureChart(); }catch(e){ return; }
  if(tab!=='stats' || !document.getElementById('c1')) return;

  const L = statPerson==='All' ? ST.log : ST.log.filter(l=>l.for===statPerson);
  const muted='#B3A093', grid='rgba(179,160,147,.15)';
  Chart.defaults.color=muted; Chart.defaults.font.family="'Space Grotesk',sans-serif";
  const legendOpts={position:'bottom',labels:{boxWidth:10,boxHeight:10,font:{size:10},padding:8}};

  // 1) by type — colored per drink
  const byType=tally(L.map(l=>l.drink));
  const typeLabels=Object.keys(byType);
  charts.push(new Chart($('#c1'),{type:'bar',
    data:{labels:typeLabels,datasets:[{data:Object.values(byType),backgroundColor:typeLabels.map(colorFor),borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{x:{grid:{display:false},ticks:{maxRotation:60,autoSkip:false,font:{size:10}}},
              y:{grid:{color:grid},ticks:{precision:0,stepSize:1},beginAtZero:true}}}}));

  // 2) by person — stacked, colored by drink
  const drinksInL=ST.drinks.filter(d=>L.some(l=>l.drink===d));
  const people=[...new Set(L.map(l=>l.for).filter(Boolean))];
  const stackSets=drinksInL.map(d=>({label:d,stack:'s',backgroundColor:colorFor(d),borderRadius:3,
    data:people.map(pp=>L.filter(l=>l.for===pp&&l.drink===d).length)}));
  charts.push(new Chart($('#c2'),{type:'bar',data:{labels:people,datasets:stackSets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:legendOpts,tooltip:{enabled:false}},
      scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,grid:{color:grid},ticks:{precision:0,stepSize:1},beginAtZero:true}}}}));

  // 3) over time — cumulative line, top 5 drinks only
  const top5=Object.keys(tally(L.map(l=>l.drink))).slice(0,5);
  const days=[...new Set(L.map(l=>(l.ts||'').slice(0,10)).filter(Boolean))].sort();
  const lineSets=top5.map(d=>{ let cum=0;
    const data=days.map(day=>{ cum+=L.filter(l=>l.drink===d&&(l.ts||'').slice(0,10)===day).length; return cum; });
    return {label:d,data,borderColor:colorFor(d),backgroundColor:colorFor(d),borderWidth:2,tension:.3,pointRadius:0};
  });
  charts.push(new Chart($('#c3'),{type:'line',data:{labels:days.map(fmtDay),datasets:lineSets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:legendOpts,tooltip:{enabled:false}},
      scales:{x:{grid:{display:false},ticks:{autoSkip:true,maxTicksLimit:6,font:{size:10}}},
              y:{grid:{color:grid},ticks:{precision:0},beginAtZero:true}}}}));

  // 4) by country — pie, unspecified beans grouped separately
  const byCountry=tally(L.map(l=>{ const b=ST.beans.find(x=>x.name===l.bean); return (b&&b.country)||'Unspecified'; }));
  const countryLabels=Object.keys(byCountry);
  charts.push(new Chart($('#c4'),{type:'pie',
    data:{labels:countryLabels,datasets:[{data:Object.values(byCountry),
      backgroundColor:countryLabels.map((c,i)=>c==='Unspecified'?muted:PALETTE[i%PALETTE.length])}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:legendOpts,tooltip:{enabled:false}}}}));
}
function tally(arr){ const o={}; arr.forEach(v=>{ if(v==null||v==='')return; o[v]=(o[v]||0)+1; });
  return Object.fromEntries(Object.entries(o).sort((a,b)=>b[1]-a[1])); }

/* optimistic write: update on screen now, sync in background, self-heal on failure */
const optArr = cat => cat==='drink'?ST.drinks : cat==='barista'?ST.baristas : ST.people;
const beanById = id => ST.beans.find(x=>x.id===id);
const renderCur = ()=>{ tab==='maint'?renderMaint() : tab==='beans'?renderBeans() : render(); };
/* guards double-taps on actions that re-render (and thus swap out) their own button mid-flight */
const pendingBeanActions = new Set();
function guardedMutate(key, apply, apiParams){
  if (pendingBeanActions.has(key)) return;
  pendingBeanActions.add(key);
  mutate(apply, apiParams).finally(()=>pendingBeanActions.delete(key));
}
async function mutate(apply, apiParams){
  apply(); cacheSaveFromST(); renderCur();
  try{ const r=await api(apiParams); if(!r||!r.ok) throw 0; }
  catch(e){ errToast(); try{ await refresh(); }catch(_){} renderCur(); }
}
/* commit a single bean field to the sheet without blocking the UI; self-heal on failure */
function commitBean(id, field, value){
  const p={action:'updateBean',id}; p[field]=value;
  api(p).then(r=>{ if(!r||!r.ok) throw 0; })
    .catch(()=>{ errToast(); refresh().then(renderCur).catch(()=>{}); });
}

/* ---------- BEANS ---------- */
let beanStackIndex = {};
function beanGroupKey(b){ return [b.name,b.roaster,b.country].map(x=>(x||'').toLowerCase().trim()).join('|'); }
function beanStackHtml(group, gi){
  if(group.length===1) return beanCard(group[0]);
  const key=beanGroupKey(group[0]);
  let idx=beanStackIndex[key]||0; if(idx>=group.length) idx=0;
  const b=group[idx];
  return `<div class="beanstack" data-stack-idx="${gi}">
    <div class="stackbar">
      <button class="stacknav" data-stack-prev aria-label="Previous bag">&lsaquo;</button>
      <span class="stackcount">${esc(b.name)} · bag ${idx+1} of ${group.length}</span>
      <button class="stacknav" data-stack-next aria-label="Next bag">&rsaquo;</button>
    </div>
    ${beanCard(b)}
  </div>`;
}
function renderBeans(){
  const shown=[...ST.beans].sort((a,b)=>((a.status==='active'?0:1)-(b.status==='active'?0:1))||b.id-a.id);
  const groups=[]; const seen=new Map();
  shown.forEach(b=>{ const k=beanGroupKey(b);
    if(seen.has(k)) groups[seen.get(k)].push(b); else { seen.set(k, groups.length); groups.push([b]); } });
  view.innerHTML=`<h1 class="page-title">Beans</h1>
    <button class="addbeans" id="addBtnBeans">Add new beans</button>
    <div id="beansList">${groups.map((g,gi)=>beanStackHtml(g,gi)).join('')}</div>`;
  $('#addBtnBeans').onclick=openBeanSheet;
  $('#roasterList').innerHTML=roasterOptions();
  groups.forEach((g,gi)=>{
    if(g.length<2) return;
    const key=beanGroupKey(g[0]);
    const wrap=document.querySelector(`[data-stack-idx="${gi}"]`);
    wrap.querySelector('[data-stack-prev]').onclick=()=>{ beanStackIndex[key]=((beanStackIndex[key]||0)-1+g.length)%g.length; renderBeans(); };
    wrap.querySelector('[data-stack-next]').onclick=()=>{ beanStackIndex[key]=((beanStackIndex[key]||0)+1)%g.length; renderBeans(); };
  });
  wireBeanCards();
}
function optSection(title,cat,items){
  const rows=(items||[]).map(v=>`<div class="row"><span class="nm">${esc(v)}</span>
    ${cat==='drink'?`<select data-drink-icon="${esc(v)}">${iconOptions(ST.drinkIcons[v]||'')}</select>`:''}
    <button class="iconbtn" data-opt-remove='${esc(JSON.stringify([cat,v]))}'>&times;</button></div>`).join('');
  return `<div class="msec"><p class="eyebrow">${title}</p>${rows}
    <div class="addrow" data-opt-add="${cat}"><input autocomplete="off"><button>Add</button></div></div>`;
}
function beanCard(b){
  const low=b.grams<=LOW_AT, arch=b.status!=='active';
  const cupsLeft = b.grams>GRAMS_PER ? Math.floor(b.grams/GRAMS_PER) : null;
  return `<div class="beancard ${arch?'arch':''}" data-bean-id="${b.id}">
    <div class="bhead">
      <div class="bidfields">
        <input class="bname" data-name value="${esc(b.name)}" placeholder="Name" autocomplete="off">
        <input class="broaster" data-roaster list="roasterList" value="${esc(b.roaster)}" placeholder="Roaster" autocomplete="off">
        <input class="bnotes" data-notes value="${esc(b.notes)}" placeholder="Notes" autocomplete="off">
        <div class="bpair">
          <input class="bprocess" data-process value="${esc(b.process)}" placeholder="Process" autocomplete="off">
          <input class="bvariety" data-variety value="${esc(b.variety)}" placeholder="Variety" autocomplete="off">
        </div>
      </div>
      <span class="pill ${low?'warn':''}">${fmt(b.grams)}g${low?' · Low':''}${cupsLeft!=null?` · ${cupsLeft} cups left`:''}</span>
    </div>
    <div class="ctrls">
      <div class="ctl"><span class="k">Country</span><select data-country>${countryOptions(b.country)}</select></div>
      <div class="ctl"><span class="k">Roast date</span><input type="date" data-roast value="${b.roastDate?esc(b.roastDate.slice(0,10)):''}"></div>
      <div class="ctl"><span class="k">Opened</span><input type="date" data-opened value="${b.opened?esc(b.opened.slice(0,10)):''}"></div>
      <div class="ctl"><span class="k">Grind</span><input type="number" min="0" max="10" step="1" data-grind value="${b.grind===''||b.grind==null?'':b.grind}"></div>
      <div class="ctl"><span class="k">Grams</span><input type="number" step="0.5" data-grams value="${fmt(b.grams)}"></div>
      <div class="ctl"><span class="k">Cost, &pound;</span><input type="number" step="0.01" min="0" data-cost value="${b.cost===''||b.cost==null?'':b.cost}"></div>
      <div class="ctl"><span class="k">Our rating</span><input type="number" min="1" max="10" step="1" data-rating value="${b.rating===''||b.rating==null?'':b.rating}"></div>
      <button class="step save hide" data-save>Save</button>
      <button class="step" data-dec>&minus;17.5g</button>
      <button class="step" data-arch>${arch?'Restore':'Donezo'}</button>
    </div></div>`;
}
function wireBeanCards(){
  document.querySelectorAll('[data-bean-id]').forEach(card=>{
    const id=+card.dataset.beanId;
    const gr=card.querySelector('[data-grind]'), gm=card.querySelector('[data-grams]'), op=card.querySelector('[data-opened]');
    // grams: update data on every keystroke, sync to sheet shortly after typing stops
    gm.oninput=()=>{ const v=Math.max(0, +gm.value||0); const b=beanById(id); if(b) b.grams=v; cacheSaveFromST();
      clearTimeout(gm._t); gm._t=setTimeout(()=>commitBean(id,'grams',v),700); };
    // grind: same live pattern, clamped 0–10
    gr.oninput=()=>{ const v=gr.value===''?'':Math.max(0,Math.min(10,Math.round(+gr.value))); const b=beanById(id); if(b) b.grind=v; cacheSaveFromST();
      clearTimeout(gr._t); gr._t=setTimeout(()=>commitBean(id,'grind',v),700); };
    op.onchange=()=>{ const v=op.value; const b=beanById(id); if(b) b.opened=v; cacheSaveFromST(); commitBean(id,'opened',v); };
    const rd=card.querySelector('[data-roast]');
    rd.onchange=()=>{ const v=rd.value; const b=beanById(id); if(b) b.roastDate=v; cacheSaveFromST(); commitBean(id,'roastDate',v); };
    // name/roaster/notes/process/variety: explicit save button, appears once any is edited
    const nameIn=card.querySelector('[data-name]'), roasterIn=card.querySelector('[data-roaster]'),
          notesIn=card.querySelector('[data-notes]'), processIn=card.querySelector('[data-process]'),
          varietyIn=card.querySelector('[data-variety]'), saveBtn=card.querySelector('[data-save]');
    const idInputs={name:nameIn, roaster:roasterIn, notes:notesIn, process:processIn, variety:varietyIn};
    const orig={name:nameIn.value, roaster:roasterIn.value, notes:notesIn.value, process:processIn.value, variety:varietyIn.value};
    const checkDirty=()=>{ const dirty = Object.keys(idInputs).some(k=>idInputs[k].value!==orig[k]);
      saveBtn.classList.toggle('hide', !dirty); };
    const saveIds=()=>{
      const name=nameIn.value.trim();
      if(!name){ nameIn.focus(); return; }
      const vals={name, roaster:roasterIn.value.trim(), notes:notesIn.value.trim(),
        process:processIn.value.trim(), variety:varietyIn.value.trim()};
      const b=beanById(id); if(b) Object.assign(b, vals);
      Object.keys(idInputs).forEach(k=>{ idInputs[k].value=vals[k]; orig[k]=vals[k]; });
      cacheSaveFromST(); saveBtn.classList.add('hide');
      api(Object.assign({action:'updateBean',id}, vals)).then(r=>{ if(!r||!r.ok) throw 0; })
        .catch(()=>{ errToast(); refresh().then(renderCur).catch(()=>{}); });
    };
    Object.values(idInputs).forEach(inp=>{ inp.oninput=checkDirty;
      inp.onkeydown=e=>{ if(e.key==='Enter'){ inp.blur(); if(!saveBtn.classList.contains('hide')) saveIds(); } }; });
    saveBtn.onclick=saveIds;
    const co=card.querySelector('[data-country]'), ra=card.querySelector('[data-rating]');
    co.onchange=()=>{ const v=co.value; const b=beanById(id); if(b) b.country=v; cacheSaveFromST(); commitBean(id,'country',v); };
    ra.oninput=()=>{ const v=ra.value===''?'':Math.max(1,Math.min(10,Math.round(+ra.value||0))); const b=beanById(id); if(b) b.rating=v; cacheSaveFromST();
      clearTimeout(ra._t); ra._t=setTimeout(()=>commitBean(id,'rating',v),700); };
    const cs=card.querySelector('[data-cost]');
    cs.oninput=()=>{ const v=cs.value===''?'':Math.max(0,+cs.value||0); const b=beanById(id); if(b) b.cost=v; cacheSaveFromST();
      clearTimeout(cs._t); cs._t=setTimeout(()=>commitBean(id,'cost',v),700); };
    card.querySelector('[data-dec]').onclick=()=>{
      guardedMutate(id+':dec', ()=>{ const b=beanById(id); b.grams=Math.max(0, Math.round((b.grams-GRAMS_PER)*10)/10); }, {action:'updateBean',id,delta:-GRAMS_PER}); };
    card.querySelector('[data-arch]').onclick=()=>{ const b=beanById(id); const ns=b.status==='active'?'archived':'active';
      guardedMutate(id+':arch', ()=>{ b.status=ns; }, {action:'updateBean',id,status:ns}); };
  });
}

/* ---------- shared ---------- */
function stateBlock(isError){
  return `<div class="state ${isError?'':'pulse'}"><span style="color:var(--cream)">${LOGO}</span>
    ${isError?`<p class="errline">Couldn’t reach the sheet.</p><button class="retry" id="retryBtn">Retry</button>`:''}</div>`;
}
function errToast(){ const s=$('#splash'); s.querySelector('span').innerHTML='⚠️'; s.classList.add('on');
  setTimeout(()=>{s.classList.remove('on'); setTimeout(()=>s.querySelector('span').innerHTML=LOGO,250);},1100); }

/* ---------- force refresh ---------- */
$('#refreshBtn').onclick=async()=>{
  const btn=$('#refreshBtn'); if(btn.disabled) return;
  btn.disabled=true; btn.classList.add('spin');
  try{ await refresh(); render(); }
  catch(e){ errToast(); }
  finally{ btn.disabled=false; btn.classList.remove('spin'); }
};

/* ---------- data ---------- */
async function refresh(){
  const r=await api({action:'getData'}); if(!r||!r.ok) throw new Error('bad');
  applyData(r); cacheSave(r);
  if(orderSyncFailed){ orderSyncFailed=false; updateSyncBanner(); }
}
async function boot(){
  renderNav();
  if(API_URL.indexOf('PASTE_')===0){ render(); return; }
  const cached=cacheLoad();
  const prevSig=cached?JSON.stringify(cached):null;
  if(cached){ applyData(cached); render(); }        // instant from cache
  else { view.innerHTML=stateBlock(false); }         // first ever load
  try{
    const r=await api({action:'getData'}); if(!r||!r.ok) throw new Error('bad');
    applyData(r); cacheSave(r);
    if(JSON.stringify(r)!==prevSig) render();          // only redraw if something changed
  }catch(e){
    if(!cached){ view.innerHTML=stateBlock(true); const rb=$('#retryBtn'); if(rb) rb.onclick=boot; }
  }
}
boot();
</script>
